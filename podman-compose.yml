# =============================================================================
# OWL-AGENT Podman Compose v7.1
#
# v7.1 changes:
#   - DELETED Redis service. RedisPubSubMesh was dead code (deleted in v7.1);
#     the Redis container + port mapping was pure attack surface. If you need
#     Redis for your own purposes, add it back manually.
#   - DELETED dead env vars: OWL_CACHE_MAX_ENTRIES (forward_proxy.py doesn't
#     read it), OWL_ENRICH_ENABLED (not a real env var name).
#   - FIXED owl-proxy bind: was 0.0.0.0 (open proxy!) with no auth token.
#     Now defaults to 127.0.0.1. To bind non-loopback, set OWL_PROXY_HOST
#     AND OWL_PROXY_TOKEN in your .env file.
#
# Usage:
#   podman-compose up -d              # Start all services
#   podman-compose up -d owl-proxy    # Start proxy only
#   podman-compose logs -f owl-proxy  # View logs
#   podman-compose down               # Stop all
#
# To expose the proxy on the network (DANGEROUS — requires auth):
#   Create .env with:
#     OWL_PROXY_HOST=0.0.0.0
#     OWL_PROXY_TOKEN=<openssl rand -hex 32>
# =============================================================================

services:
  # ── Forward Proxy (core) ──────────────────────────────────────────────────
  owl-proxy:
    build:
      context: .
      dockerfile: Containerfile
    container_name: owl-proxy
    restart: unless-stopped
    ports:
      - "60000:60000"
      - "42100:42100/udp"
    environment:
      - OWL_PROXY_HOST=${OWL_PROXY_HOST:-127.0.0.1}
      - OWL_PROXY_PORT=60000
      - OWL_MAX_CONNECTIONS=5
      - OWL_CONNECT_TIMEOUT=15
      - OWL_PROXY_TIMEOUT=20
      - OWL_ENABLE_MESH=${OWL_MESH:-false}
      - OWL_MESH_PORT=42100
      - OWL_PROXY_TOKEN=${OWL_PROXY_TOKEN:-}
      - UPSTREAM_PROXY=${UPSTREAM_PROXY:-}
    volumes:
      - owl-proxy-config:/home/owl/.owl-agent/config
      - owl-proxy-logs:/home/owl/.owl-agent/logs
    mem_limit: 512m
    memswap_limit: 768m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "3", "http://127.0.0.1:60000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MCP Server ────────────────────────────────────────────────────────────
  owl-mcp:
    build:
      context: .
      dockerfile: Containerfile
    container_name: owl-mcp
    restart: unless-stopped
    command: ["mcp"]
    environment:
      - OWL_MAX_CONNECTIONS=3
    volumes:
      - owl-proxy-config:/home/owl/.owl-agent/config
    mem_limit: 256m
    memswap_limit: 384m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  owl-proxy-config:
  owl-proxy-logs:
